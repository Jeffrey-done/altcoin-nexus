<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altcoin Nexus — 交易终端</title>
    <meta name="description" content="L4级自治量化交易系统" />
    <meta name="theme-color" content="#0a0e1a" />

    <!-- 机构级字体预加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon - 金色 N -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0e1a'/><rect x='2' y='2' width='28' height='28' rx='4' fill='%23d4a853'/><text x='16' y='23' font-size='20' font-weight='900' font-family='system-ui' text-anchor='middle' fill='%230a0e1a'>N</text></svg>" type="image/svg+xml" />

    <style>
      /* 防止 FOUC - 初始背景色 */
      html, body { background: #0a0e1a; margin: 0; padding: 0; }
      #app { opacity: 0; transition: opacity 0.3s ease; }
      #app.ready { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // 消除 FOUC
      requestAnimationFrame(() => {
        document.getElementById('app').classList.add('ready');
      });
    </script>
  </body>
</html>
