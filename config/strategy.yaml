short_overbought:
  # 扫描参数
  scan:
    vol_min: 500000
    price_max: 100
    pct_24h_min: 5

  # RSI参数
  rsi:
    period: 14
    daily_min: 70
    h4_enter: 65
    h4_drop: 10
    h4_peak_lookback: 12

  # 尧氏因子
  yao:
    oi_change_min: 10
    funding_max: 0.01
    funding_min: -0.005
    funding_hot: 0.005

  # 弃盘点
  abandon:
    body_drop_pct: 3
    consecutive: 3
    oi_drop_pct: 20

  # 止盈止损
  exits:
    tp1_pct: 3
    tp2_pct: 6
    tp1_close_ratio: 0.5
    hard_stop_pct: 5
    trail_activate_pct: 2
    trail_retrace_ratio: 0.5
    max_hold_hours: 24

  # 评分阈值
  scoring:
    full_threshold: 80
    half_threshold: 60
    skip_threshold: 40

  # BTC过滤
  btc_filter:
    enabled: true
    crash_threshold: -5
    pump_threshold: 8

  # 仓位配置
  position:
    default_stake: 33
    leverage: 10
