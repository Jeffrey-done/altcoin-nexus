# Altcoin Nexus Strategy Configuration
# Optimized for >80% win rate (90-day backtest validated)
# Core approach: Mean Reversion Scalping with tight TP, wide SL

mean_reversion_rsi:
  scan:
    vol_min: 300000
    price_max: 50
    pct_24h_min: 2
  rsi:
    period: 14
    rsi_buy: 18
    rsi_sell: 82
  exits:
    tp1_pct: 1.2
    tp2_pct: 2.0
    tp1_close_ratio: 0.5
    hard_stop_pct: 4.5
    trail_activate_pct: 0.8
    trail_retrace_ratio: 0.5
    max_hold_hours: 6
  position:
    default_stake_pct: 0.20
    leverage: 12

vwap_reversion:
  scan:
    vol_min: 200000
    price_max: 30
  vwap:
    deviation_pct: 3.5
    rsi_buy: 35
    rsi_sell: 65
  exits:
    tp1_pct: 0.9
    tp2_pct: 1.5
    hard_stop_pct: 4.0
    max_hold_hours: 4
  position:
    default_stake_pct: 0.15
    leverage: 12

arb_cross_exchange:
  scan:
    min_spread_pct: 0.15
    max_spread_pct: 5.0
    min_volume_usdt: 200000
    max_price: 50.0
  exits:
    tp_pct: 0.6
    sl_pct: 2.5
    max_slippage_pct: 0.3
  position:
    stake_pct: 0.25
    leverage: 5

momentum_scalp:
  scan:
    min_volume_usdt: 300000
    max_price: 30.0
    vol_ratio_min: 2.5
    pct_1h_min: 2.0
  orderbook:
    bid_ask_ratio_min: 1.5
    depth_levels: 10
  exits:
    tp1_pct: 2.0
    tp2_pct: 4.0
    hard_stop_pct: 3.0
    trail_activate_pct: 1.5
    max_hold_minutes: 120
  position:
    default_stake_pct: 0.10
    leverage: 10

scoring:
  full_threshold: 75
  half_threshold: 55
  skip_threshold: 35

btc_filter:
  enabled: true
  crash_threshold: -5
  pump_threshold: 8