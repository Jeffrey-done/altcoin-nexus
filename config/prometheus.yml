# Prometheus 配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nexus-core'
    static_configs:
      - targets: ['nexus-core:9090']
    metrics_path: '/metrics'

  - job_name: 'nexus-api'
    static_configs:
      - targets: ['nexus-api:8000']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
